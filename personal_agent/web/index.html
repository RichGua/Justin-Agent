<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Personal Agent</title>
    <link rel="stylesheet" href="/app.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="panel sidebar">
        <div class="section-title">Sessions</div>
        <button id="new-session-btn" class="ghost-button">New Session</button>
        <div id="sessions" class="session-list"></div>
      </aside>

      <main class="panel chat-panel">
        <header class="hero">
          <p class="eyebrow">Local-first memory agent</p>
          <h1>Personal Agent</h1>
          <p class="hero-copy">跨会话记住你、先提候选记忆再入库、每次回答都带可追溯回忆。</p>
        </header>

        <section id="chat" class="chat-stream"></section>

        <form id="chat-form" class="composer">
          <textarea id="message-input" rows="4" placeholder="告诉我你的偏好、长期目标或项目背景……"></textarea>
          <div class="composer-actions">
            <span class="muted">提示：说“记住……”会提高候选记忆置信度</span>
            <button type="submit" class="primary-button">Send</button>
          </div>
        </form>
      </main>

      <aside class="panel inspector">
        <section class="inspector-section">
          <div class="section-title">Pending Memory Candidates</div>
          <div id="candidates" class="stack"></div>
        </section>

        <section class="inspector-section">
          <div class="section-title">Trace</div>
          <div id="trace" class="stack muted">发送一条消息后，这里会显示本次命中的长期记忆。</div>
        </section>

        <section class="inspector-section">
          <div class="section-title">Approved Memories</div>
          <div class="search-row">
            <input id="memory-search" type="search" placeholder="Search memory..." />
            <button id="memory-search-btn" class="ghost-button">Find</button>
          </div>
          <div id="memories" class="stack"></div>
        </section>
      </aside>
    </div>

    <script src="/app.js" defer></script>
  </body>
</html>
